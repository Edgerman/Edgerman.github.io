<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT Grade Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 15px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .nav-btn:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .view {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* --- GRID/INPUTS --- */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--text-dim);
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .scan-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 30px;
        }

        .scan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        .scan-btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* --- LOG & PROGRESS --- */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-blue), #60a5fa);
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .log-box {
            background-color: #020617;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            height: 300px;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* --- LEADERBOARD --- */
        .rank-card {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dim);
            font-weight: 600;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .target-row {
            background-color: rgba(59, 130, 246, 0.2);
            font-weight: 600;
        }

        .cgpa-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">VIT INTEL</div>
        <button class="nav-btn active" onclick="showView('scanner', this)">
            <span>📡</span> Scanner
        </button>
        <button class="nav-btn" onclick="showView('leaderboard', this)">
            <span>🏆</span> Leaderboard
        </button>
        <div style="margin-top: auto; color: var(--text-dim); font-size: 12px; text-align: center">
            Web Engine v1.0
        </div>
    </aside>

    <main class="main-content">
        
        <!-- SCANNER VIEW -->
        <div id="scanner" class="view active">
            <h1>Batch Intelligence</h1>
            
            <div class="config-grid">
                <div class="input-group">
                    <label>Target Reg No</label>
                    <input type="text" id="targetReg" value="24BVD1077">
                </div>
                <div class="input-group">
                    <label>Start Number</label>
                    <input type="number" id="startNum" value="1000">
                </div>
                <div class="input-group">
                    <label>End Number</label>
                    <input type="number" id="endNum" value="1130">
                </div>
            </div>

            <button class="scan-btn" id="startBtn" onclick="startScan()">INITIATE SCAN</button>

            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
                <div class="status-text">
                    <span id="statusMsg">Ready to scan...</span>
                    <span id="progressPct">0%</span>
                </div>
            </div>

            <div class="log-box" id="logBox">System initialized... waiting for command.</div>
        </div>

        <!-- LEADERBOARD VIEW -->
        <div id="leaderboard" class="view">
            <h1>Batch Rankings</h1>
            
            <div class="rank-card" id="rankCard">
                Scan a batch to view academic standing.
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px">Rank</th>
                            <th style="width: 140px">Reg No</th>
                            <th>Name</th>
                            <th style="width: 100px">CGPA</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Rows will appear here -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        let students = [];
        let isScanning = false;

        function showView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            btn.classList.add('active');

            if (viewId === 'leaderboard') updateLeaderboardUI();
        }

        function log(msg) {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            box.innerText += `\n[${time}] ${msg}`;
            box.scrollTop = box.scrollHeight;
        }

        async function startScan() {
            if (isScanning) return;
            
            const target = document.getElementById('targetReg').value.toUpperCase();
            const prefix = target.substring(0, 5);
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value);
            
            if (!prefix || isNaN(start) || isNaN(end)) {
                alert("Please check your inputs!");
                return;
            }

            students = [];
            isScanning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "SCANNING BATCH...";
            document.getElementById('logBox').innerText = "";
            log(`Initiating scan for ${prefix} (${start}-${end})...`);

            const range = Array.from({length: end - start + 1}, (_, i) => start + i);
            let processed = 0;

            // Using batch processing to avoid overloading (5 at a time)
            const batchSize = 5;
            for (let i = 0; i < range.length; i += batchSize) {
                if (!isScanning) break;
                
                const currentBatch = range.slice(i, i + batchSize);
                await Promise.all(currentBatch.map(async (num) => {
                    const student = await fetchStudentData(prefix, num);
                    processed++;
                    
                    if (student) {
                        students.push(student);
                        log(`FOUND: ${student.regno} | ${student.cgpa}`);
                    }
                    
                    updateProgress(processed, range.length);
                }));
            }

            isScanning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "INITIATE SCAN";
            log(`Scan complete. Found ${students.length} students.`);
            
            setTimeout(() => {
                showView('leaderboard', document.querySelectorAll('.nav-btn')[1]);
            }, 1000);
        }

        async function fetchStudentData(prefix, num) {
            const regno = `${prefix}${num}`;
            const searchUrl = `https://vit-grade.onrender.com/api/search?q=${regno}`;
            
            try {
                // NOTE: This may fail due to CORS if the server doesn't allow it.
                const resp = await fetch(searchUrl);
                const data = await resp.json();
                
                if (data && data.length > 0) {
                    const match = data.find(s => s.regNo.toUpperCase() === regno);
                    if (match) {
                        const yr = regno.substring(0, 2);
                        const br = regno.substring(2, 5);
                        const gradeUrl = `https://vit-grade.onrender.com/api/grades/${yr}/${br}/${regno}`;
                        
                        const gResp = await fetch(gradeUrl);
                        const gData = await gResp.json();
                        
                        const name = gData.student_information?.name || "Unknown";
                        const cgpa = gData.tables?.cgpa_details?.[0]?.Cgpa || "N/A";
                        
                        return { regno, name, cgpa };
                    }
                }
            } catch (e) {
                console.error("Fetch error for " + regno, e);
            }
            return null;
        }

        function updateProgress(done, total) {
            const pct = Math.round((done / total) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progressPct').innerText = pct + '%';
            document.getElementById('statusMsg').innerText = `Processed ${done} of ${total}...`;
        }

        function updateLeaderboardUI() {
            const body = document.getElementById('leaderboardBody');
            const target = document.getElementById('targetReg').value.toUpperCase();
            body.innerHTML = "";

            if (students.length === 0) {
                document.getElementById('rankCard').innerText = "No data available. Run a scan first!";
                return;
            }

            const ranked = students
                .filter(s => s.cgpa !== "N/A")
                .sort((a, b) => parseFloat(b.cgpa) - parseFloat(a.cgpa));

            const targetStudent = ranked.find(s => s.regno === target);
            if (targetStudent) {
                const rank = ranked.indexOf(targetStudent) + 1;
                document.getElementById('rankCard').innerHTML = `
                    <div style="font-size: 14px; opacity: 0.8">TARGET STUDENT STANDING</div>
                    <div style="font-size: 24px; font-weight: 700; margin: 5px 0">${targetStudent.name}</div>
                    <div style="font-size: 18px; color: #fbbf24">Rank #${rank} / ${ranked.length} | CGPA: ${targetStudent.cgpa}</div>
                `;
            } else {
                document.getElementById('rankCard').innerText = "Target not found in results.";
            }

            ranked.forEach((s, idx) => {
                const isTarget = s.regno === target;
                const row = document.createElement('tr');
                if (isTarget) row.className = 'target-row';
                
                row.innerHTML = `
                    <td>#${idx + 1}</td>
                    <td>${s.regno}</td>
                    <td>${s.name}</td>
                    <td><span class="cgpa-badge">${s.cgpa}</span></td>
                `;
                body.appendChild(row);
            });
        }
    </script>
</body>
</html>
